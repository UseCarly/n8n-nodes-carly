# Publishes n8n-nodes-carly to npm with a provenance statement.
# n8n requires GitHub-Actions provenance publishing for VERIFIED community nodes
# (mandatory from 2026-05-01). Trigger by pushing a version tag:
#   npm version patch && git push --follow-tags
name: Publish

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write # required for npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
      - run: npm run build
      - run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
